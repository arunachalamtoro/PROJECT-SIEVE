name: 'Sieve PR Review'
description: 'AI-powered PR analysis with semantic dependency awareness'
author: 'Project Sieve'

branding:
  icon: 'search'
  color: 'purple'

inputs:
  anthropic_api_key:
    description: 'Anthropic API key for Claude'
    required: true
  github_token:
    description: 'GitHub token for PR comments'
    required: true
    default: ${{ github.token }}
  model:
    description: 'Claude model to use'
    required: false
    default: 'claude-sonnet-4-20250514'
  max_depth:
    description: 'Blast radius traversal depth'
    required: false
    default: '2'
  max_cost_per_review:
    description: 'Max cost per review in USD'
    required: false
    default: '0.10'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Sieve
      shell: bash
      run: npm install -g project-sieve

    - name: Restore Sieve cache
      uses: actions/cache@v4
      with:
        path: .sieve
        key: sieve-${{ runner.os }}-${{ hashFiles('**/*.ts', '**/*.js', '**/*.py') }}
        restore-keys: |
          sieve-${{ runner.os }}-

    - name: Index repository
      shell: bash
      run: sieve init --with-history

    - name: Analyze PR
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        sieve analyze --pr ${{ github.event.pull_request.number }} --json > /tmp/sieve-review.json

    - name: Post PR Comment
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const fs = require('fs');
          const review = JSON.parse(fs.readFileSync('/tmp/sieve-review.json', 'utf-8'));

          const riskBadges = {
            low: '![Risk: Low](https://img.shields.io/badge/Risk-Low-green)',
            medium: '![Risk: Medium](https://img.shields.io/badge/Risk-Medium-yellow)',
            high: '![Risk: High](https://img.shields.io/badge/Risk-High-red)',
          };

          let body = `## 🔬 Sieve Code Review\n\n`;
          body += `${riskBadges[review.risk_level] || ''}\n\n`;
          body += `### Summary\n${review.summary}\n\n`;

          if (review.breaking_changes.length > 0) {
            body += `### ⚠️ Breaking Changes\n`;
            review.breaking_changes.forEach(bc => body += `- ${bc}\n`);
            body += '\n';
          }

          if (review.blast_radius.length > 0) {
            body += `### 💥 Blast Radius\n\n`;
            body += `| File | Reason |\n|---|---|\n`;
            review.blast_radius.forEach(br => body += `| \`${br.file}\` | ${br.reason} |\n`);
            body += '\n';
          }

          if (review.suggestions.length > 0) {
            body += `### 💡 Suggestions\n`;
            review.suggestions.forEach(s => body += `- ${s}\n`);
            body += '\n';
          }

          body += `<details>\n<summary>💰 Token Usage</summary>\n\n`;
          body += `- Input tokens: ${review.tokens_used.input.toLocaleString()}\n`;
          body += `- Output tokens: ${review.tokens_used.output.toLocaleString()}\n`;
          body += `- Estimated cost: $${review.tokens_used.estimated_cost_usd.toFixed(4)}\n`;
          body += `</details>\n\n---\n`;
          body += `*Generated by [Sieve](https://github.com/project-sieve) — AI-powered PR analysis with semantic dependency awareness*`;

          // Find existing Sieve comment to update
          const comments = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const sieveComment = comments.data.find(c =>
            c.body.includes('🔬 Sieve Code Review')
          );

          if (sieveComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: sieveComment.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
